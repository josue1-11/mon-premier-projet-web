<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventaire Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        h2 { text-align: center; color: #2d3748; margin-bottom: 20px; }
        
        /* Conteneur des boutons d'administration */
        .admin-zone { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .btn-admin { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; color: white; text-decoration: none; text-align: center; }
        #btnAjouter { background: #27ae60; }
        #btnGestionCat { background: #e67e22; }

        /* Recherche et filtres */
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        /* Tableau stylé */
        .table-container { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #edf2f7; color: #4a5568; padding: 15px 8px; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px 8px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        tr:hover { background: #f8fafc; cursor: pointer; }
    </style>
</head>
<body>

<h2>📦 Inventaire</h2>

<div class="admin-zone">
    <button id="btnAjouter" class="btn-admin" style="display:none;" onclick="window.location.href='ajouter.html'">+ Ajouter un produit</button>
    <button id="btnGestionCat" class="btn-admin" style="display:none;" onclick="window.location.href='gestion_categories.html'">⚙️ Gérer les catégories</button>
</div>

<div class="controls">
    <input type="text" id="searchInput" placeholder="Rechercher par nom...">
    <select id="catFilter">
        <option value="">Toutes les catégories</option>
    </select>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 10%;">#</th>
                <th style="width: 35%;">Produit</th>
                <th style="width: 25%;">Marque</th>
                <th style="width: 30%;">Catégorie</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>

<script type="module">
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js";
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyAK5FTqYjaAvjIUP9ONBmUw",
        projectId: "mon-premier-projet-82f4c",
        storageBucket: "mon-premier-projet-82f4c.appspot.com"
    };
    initializeApp(firebaseConfig);
    const db = getFirestore();
    let allProducts = [];

    async function init() {
        const querySnapshot = await getDocs(collection(db, "Données_produit"));
        allProducts = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        allProducts.sort((a, b) => a.nom.localeCompare(b.nom));
        
        // Alimenter le filtre
        const categories = [...new Set(allProducts.map(p => p.categorie))];
        const catFilter = document.getElementById('catFilter');
        categories.forEach(cat => {
            if(cat) catFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
        });

        // Vérification des droits administrateur
        if (localStorage.getItem("userRole") === "admin") {
            document.getElementById("btnAjouter").style.display = "block";
            document.getElementById("btnGestionCat").style.display = "block";
        }
        renderTable(allProducts);
    }

    function renderTable(data) {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = data.map((p, i) => `
            <tr onclick='localStorage.setItem("produitSelectionne", JSON.stringify(${JSON.stringify(p)})); window.location.href="detail.html";'>
                <td>${i + 1}</td>
                <td><strong>${p.nom}</strong></td>
                <td>${p.marque || '-'}</td>
                <td>${p.categorie || '-'}</td>
            </tr>
        `).join('');
    }

    function filterProducts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const category = document.getElementById('catFilter').value;
        const filtered = allProducts.filter(p => {
            const matchesName = p.nom.toLowerCase().includes(searchTerm);
            const matchesCat = category === "" || p.categorie === category;
            return matchesName && matchesCat;
        });
        renderTable(filtered);
    }

    document.getElementById('searchInput').oninput = filterProducts;
    document.getElementById('catFilter').onchange = filterProducts;
    init();
</script>

</body>
</html>
