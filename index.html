<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quincaillerie La Victoire</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(180deg, #1a202c 0%, #2d3748 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            color: #f7fafc; 
        }
        .container { text-align: center; width: 90%; max-width: 400px; padding: 20px; }
        h1 { font-size: 28px; }
        p { color: #a0aec0; margin-bottom: 40px; }
        .btn { 
            padding: 18px; 
            border-radius: 12px; 
            border: 1px solid #4a5568; 
            font-size: 16px; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 20px; 
            font-weight: 600; 
            background: rgba(45, 55, 72, 0.8); 
            color: #edf2f7; 
            transition: 0.3s; 
        }
        .btn:hover { background: #2b6cb0; border-color: #63b3ed; }

        /* Style de la modale */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        .modal-card { background: #2d3748; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 300px; border: 1px solid #4a5568; }
        #adminCode { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: none; text-align: center; font-size: 18px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Quincaillerie La Victoire</h1>
        <p>Gestion intelligente de votre stock</p>
        <button class="btn" onclick="window.location.href='liste.html'; localStorage.setItem('userRole', 'lecteur');">🔍 Consulter l'inventaire</button>
        <button class="btn" onclick="document.getElementById('modal').style.display='flex'">⚙️ Mode Administration</button>
    </div>

    <div id="modal">
        <div class="modal-card">
            <h3 style="margin-top:0">Code Administrateur</h3>
            <input type="password" id="adminCode" placeholder="••••">
            <button class="btn" onclick="verifierCode()">Valider</button>
            <button style="background:none; border:none; color:#a0aec0; cursor:pointer;" onclick="document.getElementById('modal').style.display='none'">Annuler</button>
        </div>
    </div>

    <script>
        function verifierCode() {
            const code = document.getElementById('adminCode').value;
            if (code === "victoir900jr") {
                localStorage.setItem("userRole", "admin");
                window.location.href = 'liste.html';
            } else {
                alert("Code erroné");
            }
        }
    </script>
</body>
</html>
